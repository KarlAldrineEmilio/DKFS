<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donya Kiara</title>
    <link rel="stylesheet" href="DonyaKiaraCSS.css">
</head>
<body>

    <div class="container">

        <!-- Logo (button but no link) -->
        <img src="DonyaKiaraLogo.png" id="logo" class="menu-btn" alt="Donya Kiara Logo">

        <!-- Menu -->
        <div id="menu">

            <a href="https://www.facebook.com/kj.meimban" target="_blank">
                <img src="Contact.png" class="menu-btn" alt="Contact">
            </a>

            <a href="Cakes.html">
                <img src="Cakes.png" class="menu-btn" alt="Cakes">
            </a>

            <a href="Pastries.html">
                <img src="Pastries.png" class="menu-btn" alt="Pastries">
            </a>

            <a href="Bilao.html">
                <img src="Bilao.png" class="menu-btn" alt="Bilao">
            </a>

            <a href="https://forms.gle/zkCgcy8XzTqf7Nvs9" target="_blank">
                <img src="Order.png" class="menu-btn" alt="Order">
            </a>

        </div>
    </div>

    <audio id="clickSound" src="ButtonClickSound.wav"></audio>
    <audio id="bgMusic" src="Done-CookingMamaSoundtrack.mp3" loop></audio>

    <script>
        const clickSound = document.getElementById("clickSound");
        const bgMusic = document.getElementById("bgMusic");

        let started = false;

        function unlockAudio() {
            if (started) return;
            bgMusic.volume = 1.0;
            bgMusic.play().catch(() => {});
            started = true;
        }

        document.addEventListener("pointerdown", unlockAudio, { once: true });

        document.querySelectorAll(".menu-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                clickSound.currentTime = 0;
                clickSound.play();
            });
        });
    </script>

</body>
</html>
